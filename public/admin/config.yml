backend:
  name: github
  repo: yiqianpu-del/aura-cloud-tao
  branch: main
  base_url: https://go.appifylab.com/api/auth

local_backend: true

site_url: https://auracloudtao.com
display_url: https://auracloudtao.com
logo_url: https://auracloudtao.com/favicon.svg
media_folder: public/images
public_folder: /images
publish_mode: editorial_workflow

collections:
  # ── Site Settings ──
  - name: "site"
    label: "Site Settings"
    file: "data/content/site.json"
    preview: false
    fields:
      - label: "Site"
        name: "site"
        widget: "object"
        fields:
          - { label: "Site Name", name: "name", widget: "string" }
          - { label: "Tagline", name: "tagline", widget: "string" }
          - { label: "Description", name: "description", widget: "text" }
          - { label: "URL", name: "url", widget: "string" }
          - { label: "WhatsApp Number", name: "whatsapp", widget: "string" }
          - { label: "WhatsApp Link", name: "whatsappLink", widget: "string" }
          - { label: "Email", name: "email", widget: "string" }
          - { label: "Master Name", name: "masterName", widget: "string" }
          - { label: "Master Title", name: "masterTitle", widget: "string" }
          - { label: "Master Bio", name: "masterBio", widget: "text" }

  # ── Homepage ──
  - name: "homepage"
    label: "Homepage"
    file: "data/content/homepage.json"
    preview: false
    fields:
      - label: "Hero"
        name: "homepage"
        widget: "object"
        fields:
          - label: "Title", name: "hero", widget: "object", fields: [
              { label: "Title", name: "title", widget: "string" },
              { label: "Subtitle", name: "subtitle", widget: "string" },
              { label: "Description", name: "description", widget: "text" },
              { label: "Background Image", name: "backgroundImage", widget: "image" }
            ]
          }
          - label: "Features", name: "features", widget: "object", fields: [
              { label: "Heading", name: "heading", widget: "string" },
              { label: "Subheading", name: "subheading", widget: "string" },
              { label: "Chinese Sub", name: "chineseSub", widget: "string" }
            ]
          }
          - { label: "FAQ", name: "faq", widget: "object" }

  # ── About ──
  - name: "about"
    label: "About Page"
    file: "data/content/about.json"
    preview: false
    fields:
      - label: "About"
        name: "about"
        widget: "object"
        fields:
          - { label: "Heading", name: "heading", widget: "string" }
          - { label: "Subheading", name: "subheading", widget: "string" }
          - { label: "Mission", name: "mission", widget: "object" }
          - { label: "Values", name: "values", widget: "object" }
          - { label: "Practitioner", name: "practitioner", widget: "object" }

  # ── Services ──
  - name: "services"
    label: "Services"
    file: "data/content/services.json"
    preview: false
    fields:
      - label: "Services"
        name: "services"
        widget: "object"
        fields:
          - { label: "Ritual Page", name: "page", widget: "object" }
          - { label: "Divination Page", name: "divinationPage", widget: "object" }
          - { label: "Feng Shui Page", name: "fengshuiPage", widget: "object" }

  # ── Culture ──
  - name: "culture"
    label: "Culture"
    file: "data/content/culture.json"
    preview: false
    fields:
      - label: "Culture"
        name: "culture"
        widget: "object"
        fields:
          - { label: "Heading", name: "heading", widget: "string" }
          - { label: "Subheading", name: "subheading", widget: "string" }
          - { label: "Topics", name: "topics", widget: "list", fields: [
              { label: "Slug", name: "slug", widget: "string" },
              { label: "Icon", name: "icon", widget: "string" },
              { label: "Title", name: "title", widget: "string" },
              { label: "Description", name: "desc", widget: "text" }
            ]}

  # ── Blog Posts ──
  - name: "posts"
    label: "Blog Posts"
    file: "src/data/posts.json"
    preview: false
    fields:
      - label: "Posts"
        name: "posts"
        widget: "list"
        fields:
          - { label: "Slug", name: "slug", widget: "string" }
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Category", name: "category", widget: "select", options: ["Wellness", "Talismans", "Feng Shui", "Divination", "Culture"] }
          - { label: "Date", name: "date", widget: "datetime" }
          - { label: "Author", name: "author", widget: "string" }
          - { label: "Excerpt", name: "excerpt", widget: "text" }
          - { label: "Reading Time", name: "readingTime", widget: "string" }

  # ── Learn ──
  - name: "learn"
    label: "Learn Page"
    file: "data/content/learn.json"
    preview: false
    fields:
      - label: "Learn"
        name: "learn"
        widget: "object"
        fields:
          - { label: "Heading", name: "heading", widget: "string" }
          - { label: "Subheading", name: "subheading", widget: "string" }
          - { label: "Sections", name: "sections", widget: "list", fields: [
              { label: "Icon", name: "icon", widget: "string" },
              { label: "Title", name: "title", widget: "string" },
              { label: "Description", name: "desc", widget: "text" },
              { label: "Link", name: "href", widget: "string" }
            ]}

  # ── Community ──
  - name: "community"
    label: "Community Page"
    file: "data/content/community.json"
    preview: false
    fields:
      - label: "Community"
        name: "community"
        widget: "object"
        fields:
          - { label: "Heading", name: "heading", widget: "string" }
          - { label: "Subheading", name: "subheading", widget: "string" }
          - { label: "Chinese Sub", name: "chineseSub", widget: "string" }

  # ── FAQ ──
  - name: "faq"
    label: "FAQ Page"
    file: "data/content/faq.json"
    preview: false
    fields:
      - label: "FAQ"
        name: "faq"
        widget: "object"
        fields:
          - { label: "Heading", name: "heading", widget: "string" }
          - { label: "Subheading", name: "subheading", widget: "string" }
          - { label: "Questions", name: "faqs", widget: "list", fields: [
              { label: "Question", name: "q", widget: "string" },
              { label: "Answer", name: "a", widget: "text" }
            ]}

  # ── Shop ──
  - name: "shop"
    label: "Shop Page"
    file: "data/content/shop.json"
    preview: false
    fields:
      - label: "Shop"
        name: "shop"
        widget: "object"
        fields:
          - { label: "Heading", name: "heading", widget: "string" }
          - { label: "Subheading", name: "subheading", widget: "string" }
          - { label: "Chinese Sub", name: "chineseSub", widget: "string" }

  # ── Contact ──
  - name: "contact"
    label: "Contact Page"
    file: "data/content/contact.json"
    preview: false
    fields:
      - label: "Contact"
        name: "contact"
        widget: "object"
        fields:
          - { label: "Heading", name: "heading", widget: "string" }
          - { label: "Subheading", name: "subheading", widget: "string" }
          - { label: "CTA Text", name: "ctaText", widget: "string" }
          - { label: "Response Time", name: "responseTime", widget: "string" }
          - { label: "Email Label", name: "emailLabel", widget: "string" }
          - { label: "Hours", name: "hoursLabel", widget: "string" }

  # ── Routing ──
  - name: "routing"
    label: "Smart Routing"
    file: "data/content/routing.json"
    preview: false
    fields:
      - label: "Routing"
        name: "routing"
        widget: "object"
        fields:
          - { label: "Default Channel", name: "defaultChannel", widget: "select", options: ["whatsapp", "email", "telegram"] }
          - { label: "Channels", name: "channels", widget: "object" }
          - { label: "Messages (raw JSON)", name: "messages", widget: "code", default_language: "json" }
