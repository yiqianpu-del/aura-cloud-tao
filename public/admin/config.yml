backend:
  name: github
  repo: yiqianpu-del/aura-cloud-tao
  branch: main
  # 使用 Decap CMS 官方提供的 OAuth 代理服务
  # 不需要你自己去 GitHub 创建 OAuth App
  base_url: https://api.decap-cms.app
  auth_endpoint: auth

media_folder: "public/images/uploads"
public_folder: "/images/uploads"
publish_mode: editorial_workflow

# 本地开发时使用测试模式
local_backend: true

collections:
  - name: "site"
    label: "⚙️ 网站基础设置"
    editor: { preview: false }
    files:
      - name: "general"
        label: "站点信息 & 导航"
        file: "data/content/site.json"
        format: "json"
        fields:
          - { label: "站点名称", name: "site.name", widget: "string" }
          - { label: "标语", name: "site.tagline", widget: "string" }
          - { label: "站点描述 (SEO)", name: "site.description", widget: "text", required: false }
          - { label: "网站 URL", name: "site.url", widget: "string" }
          - { label: "WhatsApp 号码", name: "site.whatsapp", widget: "string" }
          - { label: "邮箱", name: "site.email", widget: "string" }
          - { label: "Instagram 链接", name: "site.social.instagram", widget: "string", required: false }
          - { label: "Facebook 链接", name: "site.social.facebook", widget: "string", required: false }
          - { label: "大师名称", name: "site.masterName", widget: "string" }
          - { label: "大师头衔", name: "site.masterTitle", widget: "string" }
          - { label: "大师简介", name: "site.masterBio", widget: "text" }
          - label: "导航菜单"
            name: "site.navigation"
            widget: "list"
            summary: "{{fields.label}} → {{fields.href}}"
            fields:
              - { label: "菜单名称", name: "label", widget: "string" }
              - { label: "链接路径", name: "href", widget: "string" }

  - name: "homepage"
    label: "🏠 首页"
    files:
      - name: "hero"
        label: "Hero 大横幅"
        file: "data/content/homepage.json"
        format: "json"
        fields:
          - { label: "主标题", name: "homepage.hero.title", widget: "string" }
          - { label: "副标题", name: "homepage.hero.subtitle", widget: "string" }
          - { label: "描述文字", name: "homepage.hero.description", widget: "text" }
          - { label: "按钮文字", name: "homepage.hero.ctaText", widget: "string" }
          - { label: "背景图片", name: "homepage.hero.backgroundImage", widget: "image" }

      - name: "features"
        label: "四大板块"
        file: "data/content/homepage.json"
        format: "json"
        fields:
          - { label: "板块标题", name: "homepage.features.heading", widget: "string" }
          - { label: "板块副标题", name: "homepage.features.subheading", widget: "string" }
          - { label: "中文副标题", name: "homepage.features.chineseSub", widget: "string" }
          - label: "板块列表"
            name: "homepage.features.sections"
            widget: "list"
            summary: "{{fields.title}}"
            fields:
              - { label: "标题 (英)", name: "title", widget: "string" }
              - { label: "标题 (中)", name: "titleCn", widget: "string" }
              - { label: "描述", name: "desc", widget: "text" }
              - { label: "链接", name: "href", widget: "string" }

      - name: "howitworks"
        label: "仪式流程"
        file: "data/content/homepage.json"
        format: "json"
        fields:
          - { label: "大标题", name: "homepage.howItWorks.heading", widget: "string" }
          - { label: "副标题", name: "homepage.howItWorks.subheading", widget: "string" }
          - { label: "中文副标题", name: "homepage.howItWorks.chineseSub", widget: "string" }
          - label: "步骤列表"
            name: "homepage.howItWorks.steps"
            widget: "list"
            summary: "{{fields.title}}"
            fields:
              - { label: "步骤 (英)", name: "title", widget: "string" }
              - { label: "步骤 (中)", name: "titleCn", widget: "string" }
              - { label: "图标", name: "icon", widget: "string" }
              - { label: "描述", name: "description", widget: "text", required: false }

      - name: "packages"
        label: "祈福套餐"
        file: "data/content/homepage.json"
        format: "json"
        fields:
          - { label: "大标题", name: "homepage.packages.heading", widget: "string" }
          - { label: "副标题", name: "homepage.packages.subheading", widget: "string" }
          - { label: "中文副标题", name: "homepage.packages.chineseSub", widget: "string" }
          - label: "套餐列表"
            name: "homepage.packages.items"
            widget: "list"
            summary: "{{fields.name}}"
            fields:
              - { label: "套餐名称", name: "name", widget: "string" }
              - { label: "价格 (USD)", name: "price", widget: "string" }
              - { label: "描述", name: "description", widget: "text" }
              - { label: "服务清单", name: "includes", widget: "list", field: { label: "项目", name: "item", widget: "string" } }
              - { label: "链接", name: "href", widget: "string", required: false }

      - name: "faq"
        label: "首页 FAQ"
        file: "data/content/homepage.json"
        format: "json"
        fields:
          - { label: "大标题", name: "homepage.faq.heading", widget: "string" }
          - { label: "副标题", name: "homepage.faq.subheading", widget: "string" }
          - { label: "中文副标题", name: "homepage.faq.chineseSub", widget: "string" }
          - label: "FAQ 列表"
            name: "homepage.faq.items"
            widget: "list"
            summary: "{{fields.q}}"
            fields:
              - { label: "问题", name: "q", widget: "string" }
              - { label: "答案", name: "a", widget: "text" }

  - name: "services"
    label: "🕯️ 法事服务"
    files:
      - name: "page"
        label: "服务列表页"
        file: "data/content/services.json"
        format: "json"
        fields:
          - { label: "页面标题", name: "services.page.heading", widget: "string" }
          - { label: "页面副标题", name: "services.page.subheading", widget: "string" }
          - { label: "中文副标题", name: "services.page.chineseSub", widget: "string" }
          - { label: "页面描述", name: "services.page.description", widget: "text", required: false }
          - { label: "背景图片", name: "services.page.backgroundImage", widget: "image", required: false }
          - label: "服务列表"
            name: "services.page.services"
            widget: "list"
            summary: "{{fields.title}}"
            fields:
              - { label: "名称 (英)", name: "title", widget: "string" }
              - { label: "名称 (中)", name: "titleCn", widget: "string" }
              - { label: "描述", name: "desc", widget: "text" }
              - { label: "详情页 Slug", name: "slug", widget: "string" }
              - { label: "图标", name: "icon", widget: "string", required: false }
              - { label: "图片", name: "image", widget: "image", required: false }

      - name: "divination"
        label: "奇门问卦页"
        file: "data/content/services.json"
        format: "json"
        fields:
          - { label: "页面标题", name: "services.divinationPage.heading", widget: "string" }
          - { label: "副标题", name: "services.divinationPage.subheading", widget: "string" }
          - { label: "中文副标题", name: "services.divinationPage.chineseSub", widget: "string" }
          - { label: "页面描述", name: "services.divinationPage.description", widget: "text" }
          - { label: "背景图片", name: "services.divinationPage.backgroundImage", widget: "image", required: false }
          - label: "服务项目"
            name: "services.divinationPage.services"
            widget: "list"
            summary: "{{fields.title}}"
            fields:
              - { label: "名称 (英)", name: "title", widget: "string" }
              - { label: "名称 (中)", name: "titleCn", widget: "string" }
              - { label: "描述", name: "desc", widget: "text" }
              - { label: "详情页 Slug", name: "slug", widget: "string" }
              - { label: "图片", name: "image", widget: "image", required: false }

      - name: "fengshui"
        label: "风水堪舆页"
        file: "data/content/services.json"
        format: "json"
        fields:
          - { label: "页面标题", name: "services.fengshuiPage.heading", widget: "string" }
          - { label: "副标题", name: "services.fengshuiPage.subheading", widget: "string" }
          - { label: "中文副标题", name: "services.fengshuiPage.chineseSub", widget: "string" }
          - { label: "页面描述", name: "services.fengshuiPage.description", widget: "text" }
          - { label: "背景图片", name: "services.fengshuiPage.backgroundImage", widget: "image", required: false }
          - label: "服务项目"
            name: "services.fengshuiPage.services"
            widget: "list"
            summary: "{{fields.title}}"
            fields:
              - { label: "名称 (英)", name: "title", widget: "string" }
              - { label: "名称 (中)", name: "titleCn", widget: "string" }
              - { label: "描述", name: "desc", widget: "text" }
              - { label: "详情页 Slug", name: "slug", widget: "string" }
              - { label: "图片", name: "image", widget: "image", required: false }

  - name: "shop"
    label: "🛍️ 商城页"
    files:
      - name: "content"
        label: "商城页面内容"
        file: "data/content/shop.json"
        format: "json"
        fields:
          - { label: "标题", name: "shop.heading", widget: "string" }
          - { label: "副标题", name: "shop.subheading", widget: "string" }
          - { label: "中文副标题", name: "shop.chineseSub", widget: "string" }
          - { label: "按钮文字", name: "shop.cta", widget: "string" }

  - name: "talismans"
    label: "📿 符箓页"
    files:
      - name: "content"
        label: "符箓页面内容"
        file: "data/content/talismans.json"
        format: "json"
        fields:
          - { label: "标题", name: "talismans.heading", widget: "string" }
          - { label: "描述", name: "talismans.description", widget: "text" }
          - { label: "中文副标题", name: "talismans.chineseSub", widget: "string" }
          - label: "分类图片"
            name: "talismans.categoryImages"
            widget: "list"
            summary: "{{fields.category}}"
            fields:
              - { label: "分类 ID", name: "category", widget: "string" }
              - { label: "图片路径", name: "image", widget: "image" }

  - name: "about"
    label: "🙏 关于我们"
    files:
      - name: "content"
        label: "关于页面"
        file: "data/content/about.json"
        format: "json"
        fields:
          - { label: "页面标题", name: "about.heading", widget: "string" }
          - { label: "副标题", name: "about.subheading", widget: "string" }
          - label: "使命"
            name: "about.mission"
            widget: "object"
            fields:
              - { label: "标题", name: "title", widget: "string" }
              - { label: "描述", name: "description", widget: "text" }
          - label: "核心价值观"
            name: "about.values"
            widget: "list"
            summary: "{{fields.title}}"
            fields:
              - { label: "标题", name: "title", widget: "string" }
              - { label: "描述", name: "description", widget: "text" }
          - label: "大师介绍"
            name: "about.practitioner"
            widget: "object"
            fields:
              - { label: "照片路径", name: "image", widget: "image", required: false }
              - { label: "名称", name: "name", widget: "string" }
              - { label: "头衔", name: "title", widget: "string" }
              - { label: "简介", name: "bio", widget: "text" }

  - name: "learn"
    label: "📖 道学文化"
    files:
      - name: "content"
        label: "道学页面"
        file: "data/content/learn.json"
        format: "json"
        fields:
          - { label: "页面标题", name: "learn.heading", widget: "string" }
          - { label: "副标题", name: "learn.subheading", widget: "string" }
          - label: "章节列表"
            name: "learn.sections"
            widget: "list"
            summary: "{{fields.title}}"
            fields:
              - { label: "标题", name: "title", widget: "string" }
              - { label: "描述", name: "desc", widget: "text" }
              - { label: "图标", name: "icon", widget: "string", required: false }
              - { label: "链接", name: "href", widget: "string" }
              - { label: "图片", name: "image", widget: "image", required: false }

  - name: "community"
    label: "👥 灵性社群"
    files:
      - name: "content"
        label: "社群页面"
        file: "data/content/community.json"
        format: "json"
        fields:
          - { label: "标题", name: "community.heading", widget: "string" }
          - { label: "副标题", name: "community.subheading", widget: "string" }
          - { label: "中文副标题", name: "community.chineseSub", widget: "string" }
          - label: "板块"
            name: "community.sections"
            widget: "list"
            summary: "{{fields.title}}"
            fields:
              - { label: "标题", name: "title", widget: "string" }
              - { label: "描述", name: "desc", widget: "text" }
              - { label: "图片", name: "image", widget: "image", required: false }
          - label: "详细内容"
            name: "community.details"
            widget: "list"
            summary: "{{fields.heading}}"
            fields:
              - { label: "标题", name: "heading", widget: "string" }
              - { label: "内容", name: "content", widget: "text" }

  - name: "culture"
    label: "🏮 道家文化"
    files:
      - name: "content"
        label: "文化页面"
        file: "data/content/culture.json"
        format: "json"
        fields:
          - { label: "标题", name: "culture.heading", widget: "string" }
          - { label: "副标题", name: "culture.subheading", widget: "string" }
          - label: "话题"
            name: "culture.topics"
            widget: "list"
            summary: "{{fields.title}}"
            fields:
              - { label: "标题", name: "title", widget: "string" }
              - { label: "描述", name: "desc", widget: "text" }
              - { label: "图片", name: "image", widget: "image", required: false }
          - label: "详情"
            name: "culture.details"
            widget: "list"
            summary: "{{fields.heading}}"
            fields:
              - { label: "标题", name: "heading", widget: "string" }
              - { label: "内容", name: "content", widget: "text" }

  - name: "blog"
    label: "📝 博客"
    files:
      - name: "content"
        label: "博客页"
        file: "data/content/blog.json"
        format: "json"
        fields:
          - { label: "标题", name: "blog.heading", widget: "string" }
          - { label: "副标题", name: "blog.subheading", widget: "string" }
          - label: "文章列表"
            name: "blog.posts"
            widget: "list"
            summary: "{{fields.title}}"
            fields:
              - { label: "标题", name: "title", widget: "string" }
              - { label: "日期", name: "date", widget: "string" }
              - { label: "简介", name: "excerpt", widget: "text", required: false }
              - { label: "正文", name: "content", widget: "markdown", required: false }
              - { label: "封面图片", name: "image", widget: "image", required: false }
              - { label: "Slug (URL)", name: "slug", widget: "string" }

  - name: "contact"
    label: "📞 联系我们"
    files:
      - name: "content"
        label: "联系页面"
        file: "data/content/contact.json"
        format: "json"
        fields:
          - { label: "页面标题", name: "contact.heading", widget: "string" }
          - { label: "副标题", name: "contact.subheading", widget: "string" }
          - { label: "卡片标题", name: "contact.cardHeading", widget: "string" }
          - { label: "卡片文字", name: "contact.cardText", widget: "text" }
          - { label: "按钮文字", name: "contact.ctaText", widget: "string", required: false }
          - { label: "回复时间", name: "contact.responseTime", widget: "string", required: false }
          - { label: "营业时间", name: "contact.hours", widget: "string", required: false }

  - name: "faq"
    label: "❓ 常见问题"
    files:
      - name: "content"
        label: "FAQ 页面"
        file: "data/content/faq.json"
        format: "json"
        fields:
          - { label: "页面标题", name: "faq.heading", widget: "string" }
          - { label: "副标题", name: "faq.subheading", widget: "string" }
          - label: "FAQ 列表"
            name: "faq.faqs"
            widget: "list"
            summary: "{{fields.q}}"
            fields:
              - { label: "问题", name: "q", widget: "string" }
              - { label: "答案", name: "a", widget: "text" }
          - { label: "还有问题? 标题", name: "faq.stillQuestions", widget: "string" }
          - { label: "CTA 按钮文字", name: "faq.cta", widget: "string" }
