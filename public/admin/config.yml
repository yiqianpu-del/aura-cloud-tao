backend:
  name: github
  repo: yiqianpu-del/aura-cloud-tao
  branch: main

media_folder: "public/images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "homepage"
    label: "🏠 首页"
    editor: { preview: false }
    files:
      - name: "hero"
        label: "Hero Banner"
        file: "content/homepage/hero.md"
        fields:
          - { label: "Hero Title", name: "heroTitle", widget: "string" }
          - { label: "Hero Subtitle", name: "heroSubtitle", widget: "string" }
          - { label: "Description", name: "heroDescription", widget: "text", required: false }
          - { label: "Background Image", name: "heroBackground", widget: "image", required: false }
          - { label: "CTA Button", name: "ctaText", widget: "string", default: "Begin Your Journey" }

  - name: "settings"
    label: "⚙️ 网站设置"
    editor: { preview: false }
    files:
      - name: "general"
        label: "General Settings"
        file: "content/settings/general.md"
        fields:
          - { label: "Site Name", name: "siteName", widget: "string" }
          - { label: "Tagline", name: "tagline", widget: "string" }
          - { label: "WhatsApp Number", name: "whatsapp", widget: "string" }
          - { label: "Email", name: "email", widget: "string", required: false }
          - { label: "Master Name", name: "masterName", widget: "string" }
          - { label: "Master Title", name: "masterTitle", widget: "string" }
          - { label: "Master Bio", name: "masterBio", widget: "text", required: false }
          - { label: "Master Photo", name: "masterImage", widget: "image", required: false }

  - name: "blog"
    label: "📝 博客"
    label_singular: "Post"
    folder: "content/blog"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime" }
      - { label: "Excerpt", name: "excerpt", widget: "text", required: false }
      - { label: "Image", name: "image", widget: "image", required: false }
      - { label: "Body", name: "body", widget: "markdown" }
