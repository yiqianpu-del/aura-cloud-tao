<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500">
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fef8ec"/>
      <stop offset="100%" stop-color="#f5e6c8"/>
    </linearGradient>
    <linearGradient id="red" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#c43a31"/><stop offset="100%" stop-color="#a62e26"/></linearGradient>
    <linearGradient id="goldAccent" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#ffd700"/><stop offset="100%" stop-color="#c9a96e"/></linearGradient>
  </defs>
  <rect x="20" y="20" width="360" height="460" rx="4" fill="url(#paper)" stroke="#d4c9a8" stroke-width="1"/>
  <rect x="20" y="20" width="360" height="8" rx="2" fill="url(#red)"/>
  <rect x="20" y="20" width="8" height="460" rx="2" fill="url(#red)"/>
  <!-- Wealth seal -->
  <rect x="150" y="50" width="100" height="90" rx="2" fill="url(#goldAccent)" opacity="0.9"/>
  <text x="200" y="85" text-anchor="middle" font-family="serif" font-size="14" fill="#1a1a1a" font-weight="bold">财</text>
  <text x="200" y="110" text-anchor="middle" font-family="serif" font-size="14" fill="#1a1a1a" font-weight="bold">运</text>
  <!-- Talisman strokes -->
  <path d="M70 170 Q200 140 330 175" stroke="#1a1a1a" stroke-width="3" fill="none" opacity="0.7"/>
  <path d="M60 200 Q200 230 340 195" stroke="#1a1a1a" stroke-width="2.5" fill="none" opacity="0.6"/>
  <path d="M50 230 Q150 250 200 240 Q250 230 350 245" stroke="#1a1a1a" stroke-width="3" fill="none" opacity="0.7"/>
  <path d="M50 270 Q200 250 350 280" stroke="#1a1a1a" stroke-width="2" fill="none" opacity="0.5"/>
  <path d="M70 310 Q150 330 200 300 Q280 320 330 315" stroke="#1a1a1a" stroke-width="3.5" fill="none" opacity="0.7"/>
  <path d="M60 350 Q200 370 340 345" stroke="#1a1a1a" stroke-width="2" fill="none" opacity="0.5"/>
  <path d="M80 380 Q200 400 320 385" stroke="#1a1a1a" stroke-width="2.5" fill="none" opacity="0.6"/>
  <!-- Gold coin decorations -->
  <circle cx="110" cy="175" r="6" fill="none" stroke="#c9a96e" stroke-width="1.5"/>
  <circle cx="110" cy="175" r="3" fill="#c9a96e" opacity="0.5"/>
  <circle cx="290" cy="210" r="6" fill="none" stroke="#c9a96e" stroke-width="1.5"/>
  <circle cx="290" cy="210" r="3" fill="#c9a96e" opacity="0.5"/>
  <circle cx="130" cy="320" r="6" fill="none" stroke="#c9a96e" stroke-width="1.5"/>
  <circle cx="270" cy="360" r="6" fill="none" stroke="#c9a96e" stroke-width="1.5"/>
  <!-- Bottom seal -->
  <rect x="260" y="410" width="100" height="55" rx="2" fill="url(#red)" opacity="0.85"/>
  <text x="310" y="433" text-anchor="middle" font-family="serif" font-size="11" fill="#faf6ed">财神符</text>
  <text x="310" y="452" text-anchor="middle" font-family="serif" font-size="9" fill="#faf6ed" opacity="0.8">天师府</text>
  <!-- Bottom accent -->
  <rect x="20" y="472" width="360" height="8" rx="2" fill="url(#goldAccent)"/>
</svg>
