<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500">
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#faf3f0"/>
      <stop offset="100%" stop-color="#efe0d8"/>
    </linearGradient>
    <linearGradient id="darkred" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#8b0000"/><stop offset="100%" stop-color="#5c0000"/></linearGradient>
    <linearGradient id="goldAccent" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#c9a96e"/><stop offset="100%" stop-color="#a88844"/></linearGradient>
  </defs>
  <rect x="20" y="20" width="360" height="460" rx="4" fill="url(#paper)" stroke="#c4b8a8" stroke-width="1"/>
  <rect x="20" y="20" width="360" height="8" rx="2" fill="url(#darkred)"/>
  <rect x="20" y="20" width="8" height="460" rx="2" fill="url(#darkred)"/>
  <!-- Protection seal -->
  <rect x="150" y="50" width="100" height="90" rx="2" fill="url(#darkred)" opacity="0.9"/>
  <text x="200" y="85" text-anchor="middle" font-family="serif" font-size="14" fill="#faf3f0" font-weight="bold">护</text>
  <text x="200" y="110" text-anchor="middle" font-family="serif" font-size="14" fill="#faf3f0" font-weight="bold">身</text>
  <!-- Bold protective strokes -->
  <path d="M65 165 Q200 130 335 170" stroke="#1a1a1a" stroke-width="4" fill="none" opacity="0.8"/>
  <path d="M55 200 Q200 235 345 195" stroke="#1a1a1a" stroke-width="3" fill="none" opacity="0.7"/>
  <path d="M45 235 Q150 260 200 245 Q250 230 355 250" stroke="#1a1a1a" stroke-width="3.5" fill="none" opacity="0.8"/>
  <path d="M55 275 Q200 250 345 285" stroke="#1a1a1a" stroke-width="2.5" fill="none" opacity="0.6"/>
  <path d="M65 315 Q150 340 200 310 Q280 330 335 320" stroke="#1a1a1a" stroke-width="4" fill="none" opacity="0.8"/>
  <path d="M55 355 Q200 380 345 350" stroke="#1a1a1a" stroke-width="2.5" fill="none" opacity="0.6"/>
  <!-- Shield symbol -->
  <path d="M115 175 L115 220 Q115 250 200 270 Q285 250 285 220 L285 175 Z" fill="none" stroke="#8b0000" stroke-width="1.5" opacity="0.5"/>
  <path d="M265 210 Q285 250 280 310" stroke="#c9a96e" stroke-width="1.5" fill="none" opacity="0.4"/>
  <!-- Bottom seal -->
  <rect x="260" y="410" width="100" height="55" rx="2" fill="url(#darkred)" opacity="0.85"/>
  <text x="310" y="433" text-anchor="middle" font-family="serif" font-size="11" fill="#faf3f0">避邪符</text>
  <text x="310" y="452" text-anchor="middle" font-family="serif" font-size="9" fill="#faf3f0" opacity="0.8">五雷</text>
  <!-- Bottom accent -->
  <rect x="20" y="472" width="360" height="8" rx="2" fill="url(#goldAccent)"/>
</svg>
