<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c9a96e" stop-opacity="0.15"/>
      <stop offset="70%" stop-color="#c43a31" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#faf8f5"/>
    </radialGradient>
  </defs>
  <!-- Background glow -->
  <circle cx="200" cy="200" r="200" fill="url(#bg)"/>
  <!-- Robed figure silhouette -->
  <g opacity="0.85">
    <!-- Robe body -->
    <path d="M140 380 Q130 320 135 260 Q140 220 160 200 Q180 180 200 175 Q220 180 240 200 Q260 220 265 260 Q270 320 260 380" fill="#1a1a1a"/>
    <!-- Collar -->
    <path d="M180 195 L200 220 L220 195" fill="none" stroke="#c9a96e" stroke-width="2" opacity="0.6"/>
    <!-- Head -->
    <circle cx="200" cy="165" r="30" fill="#1a1a1a"/>
    <!-- Topknot/hair -->
    <ellipse cx="200" cy="140" rx="10" ry="18" fill="#1a1a1a"/>
    <!-- Taoist crown/hat hint -->
    <rect x="190" y="132" width="20" height="10" rx="1" fill="#c9a96e" opacity="0.5"/>
  </g>
  <!-- Decorative circle behind -->
  <circle cx="200" cy="200" r="100" fill="none" stroke="#c9a96e" stroke-width="1" opacity="0.3"/>
  <circle cx="200" cy="200" r="105" fill="none" stroke="#c9a96e" stroke-width="0.5" opacity="0.2"/>
  <!-- Small ☯ at bottom -->
  <text x="200" y="260" text-anchor="middle" font-family="serif" font-size="14" fill="#c9a96e" opacity="0.4">☯</text>
</svg>
