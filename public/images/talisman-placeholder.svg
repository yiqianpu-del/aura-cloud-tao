<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500">
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#faf6ed"/>
      <stop offset="100%" stop-color="#f0e8d5"/>
    </linearGradient>
    <linearGradient id="red" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c43a31"/>
      <stop offset="100%" stop-color="#a62e26"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c9a96e"/>
      <stop offset="100%" stop-color="#b89455"/>
    </linearGradient>
  </defs>
  <!-- Paper background -->
  <rect x="20" y="20" width="360" height="460" rx="4" fill="url(#paper)" stroke="#d4c9a8" stroke-width="1"/>
  <!-- Red border top -->
  <rect x="20" y="20" width="360" height="8" rx="2" fill="url(#red)"/>
  <!-- Red border left -->
  <rect x="20" y="20" width="8" height="460" rx="2" fill="url(#red)"/>
  <!-- Decorative seal top -->
  <rect x="160" y="50" width="80" height="80" rx="2" fill="url(#red)" opacity="0.9"/>
  <text x="200" y="92" text-anchor="middle" font-family="serif" font-size="16" fill="#faf6ed">灵符</text>
  <text x="200" y="112" text-anchor="middle" font-family="serif" font-size="12" fill="#faf6ed">护身</text>
  <!-- Brush stroke lines (talisman pattern) -->
  <path d="M80 160 Q200 140 320 165" stroke="#1a1a1a" stroke-width="3" fill="none" opacity="0.7"/>
  <path d="M70 190 Q200 220 330 185" stroke="#1a1a1a" stroke-width="2.5" fill="none" opacity="0.6"/>
  <path d="M60 220 Q150 240 200 230 Q250 220 340 235" stroke="#1a1a1a" stroke-width="3" fill="none" opacity="0.7"/>
  <path d="M60 260 Q200 240 340 270" stroke="#1a1a1a" stroke-width="2" fill="none" opacity="0.5"/>
  <path d="M80 300 Q150 320 200 290 Q280 310 320 305" stroke="#1a1a1a" stroke-width="3.5" fill="none" opacity="0.7"/>
  <path d="M70 340 Q200 360 330 335" stroke="#1a1a1a" stroke-width="2" fill="none" opacity="0.5"/>
  <path d="M90 370 Q200 390 310 375" stroke="#1a1a1a" stroke-width="2.5" fill="none" opacity="0.6"/>
  <!-- Decorative dots -->
  <circle cx="120" cy="170" r="3" fill="#c43a31" opacity="0.7"/>
  <circle cx="280" cy="195" r="3" fill="#c43a31" opacity="0.7"/>
  <circle cx="150" cy="310" r="3" fill="#c43a31" opacity="0.7"/>
  <circle cx="250" cy="350" r="3" fill="#c43a31" opacity="0.7"/>
  <!-- Verification seal -->
  <rect x="270" y="400" width="90" height="60" rx="2" fill="url(#red)" opacity="0.85"/>
  <text x="315" y="424" text-anchor="middle" font-family="serif" font-size="10" fill="#faf6ed">天师府印</text>
  <text x="315" y="444" text-anchor="middle" font-family="serif" font-size="9" fill="#faf6ed">龙虎山</text>
  <!-- Bottom gold accent -->
  <rect x="20" y="472" width="360" height="8" rx="2" fill="url(#gold)"/>
</svg>
