<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500">
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5f0fa"/>
      <stop offset="100%" stop-color="#e0d8ee"/>
    </linearGradient>
    <linearGradient id="purple" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#6b4c8a"/><stop offset="100%" stop-color="#4a2d6a"/></linearGradient>
    <linearGradient id="goldAccent" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#c9a96e"/><stop offset="100%" stop-color="#a88844"/></linearGradient>
  </defs>
  <rect x="20" y="20" width="360" height="460" rx="4" fill="url(#paper)" stroke="#c8b8d8" stroke-width="1"/>
  <rect x="20" y="20" width="360" height="8" rx="2" fill="url(#purple)"/>
  <rect x="20" y="20" width="8" height="460" rx="2" fill="url(#purple)"/>
  <!-- Luck seal -->
  <rect x="150" y="50" width="100" height="90" rx="2" fill="url(#purple)" opacity="0.9"/>
  <text x="200" y="85" text-anchor="middle" font-family="serif" font-size="14" fill="#f5f0fa" font-weight="bold">运</text>
  <text x="200" y="110" text-anchor="middle" font-family="serif" font-size="14" fill="#f5f0fa" font-weight="bold">转</text>
  <!-- Dynamic flowing strokes -->
  <path d="M70 165 Q200 135 330 170" stroke="#1a1a1a" stroke-width="3" fill="none" opacity="0.7"/>
  <path d="M60 195 Q200 230 340 190" stroke="#1a1a1a" stroke-width="2.5" fill="none" opacity="0.6"/>
  <path d="M50 225 Q150 250 200 240 Q250 230 350 245" stroke="#1a1a1a" stroke-width="3" fill="none" opacity="0.7"/>
  <path d="M55 265 Q200 245 345 275" stroke="#1a1a1a" stroke-width="2" fill="none" opacity="0.5"/>
  <path d="M70 305 Q150 330 200 300 Q280 320 330 310" stroke="#1a1a1a" stroke-width="3.5" fill="none" opacity="0.7"/>
  <path d="M60 345 Q200 365 340 340" stroke="#1a1a1a" stroke-width="2" fill="none" opacity="0.5"/>
  <path d="M80 375 Q200 395 320 380" stroke="#1a1a1a" stroke-width="2.5" fill="none" opacity="0.6"/>
  <!-- Spiral good luck symbol -->
  <path d="M200 175 Q220 195 210 210 Q195 220 185 205 Q178 190 195 185 Q208 182 215 195" fill="none" stroke="#6b4c8a" stroke-width="1.2" opacity="0.5"/>
  <path d="M200 295 Q220 315 210 330 Q195 340 185 325 Q178 310 195 305" fill="none" stroke="#6b4c8a" stroke-width="1.2" opacity="0.5"/>
  <!-- Decorative dots -->
  <circle cx="115" cy="175" r="3" fill="#6b4c8a" opacity="0.5"/>
  <circle cx="285" cy="210" r="3" fill="#6b4c8a" opacity="0.5"/>
  <!-- Bottom seal -->
  <rect x="260" y="410" width="100" height="55" rx="2" fill="url(#purple)" opacity="0.85"/>
  <text x="310" y="433" text-anchor="middle" font-family="serif" font-size="11" fill="#f5f0fa">转运符</text>
  <text x="310" y="452" text-anchor="middle" font-family="serif" font-size="9" fill="#f5f0fa" opacity="0.8">太岁</text>
  <!-- Bottom accent -->
  <rect x="20" y="472" width="360" height="8" rx="2" fill="url(#goldAccent)"/>
</svg>
