<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900">
  <defs>
    <radialGradient id="glow" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#c9a96e" stop-opacity="0.15"/>
      <stop offset="60%" stop-color="#1a1a1a" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#1a1a1a" stop-opacity="1"/>
    </radialGradient>
    <linearGradient id="altar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a1f14"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
    <linearGradient id="smoke" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#c9a96e" stop-opacity="0"/>
      <stop offset="50%" stop-color="#c9a96e" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#c9a96e" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Dark background -->
  <rect width="1440" height="900" fill="#1a1a1a"/>
  <!-- Glow from altar -->
  <rect width="1440" height="900" fill="url(#glow)"/>
  <!-- Incense smoke wisps -->
  <ellipse cx="500" cy="200" rx="80" ry="200" fill="url(#smoke)" opacity="0.6"/>
  <ellipse cx="940" cy="180" rx="60" ry="180" fill="url(#smoke)" opacity="0.4"/>
  <ellipse cx="720" cy="150" rx="100" ry="250" fill="url(#smoke)" opacity="0.3"/>
  <!-- Altar table -->
  <rect x="420" y="580" width="600" height="20" rx="2" fill="#3d2b1a"/>
  <rect x="440" y="600" width="560" height="100" fill="url(#altar)" rx="2"/>
  <!-- Gold altar cloth -->
  <rect x="500" y="560" width="440" height="25" rx="1" fill="#c9a96e" opacity="0.3"/>
  <line x1="500" y1="572" x2="940" y2="572" stroke="#c9a96e" stroke-width="0.5" opacity="0.4"/>
  <!-- Candle left -->
  <rect x="490" y="370" width="12" height="190" rx="2" fill="#8b7355"/>
  <ellipse cx="496" cy="370" rx="8" ry="12" fill="#f4a460"/>
  <ellipse cx="496" cy="360" rx="4" ry="8" fill="#ffd700" opacity="0.8"/>
  <!-- Candle right -->
  <rect x="938" y="370" width="12" height="190" rx="2" fill="#8b7355"/>
  <ellipse cx="944" cy="370" rx="8" ry="12" fill="#f4a460"/>
  <ellipse cx="944" cy="360" rx="4" ry="8" fill="#ffd700" opacity="0.8"/>
  <!-- Candle glow -->
  <circle cx="496" cy="360" r="30" fill="#ffd700" opacity="0.08"/>
  <circle cx="944" cy="360" r="30" fill="#ffd700" opacity="0.08"/>
  <!-- Incense burner center -->
  <ellipse cx="720" cy="430" rx="25" ry="8" fill="#c9a96e" opacity="0.6"/>
  <path d="M695 430 Q695 380 720 370 Q745 380 745 430" fill="none" stroke="#c9a96e" stroke-width="2" opacity="0.5"/>
  <circle cx="720" cy="370" r="3" fill="#ff6b35" opacity="0.6"/>
  <!-- Talisman on altar -->
  <rect x="680" y="440" width="80" height="120" rx="2" fill="#faf6ed" opacity="0.9"/>
  <rect x="680" y="440" width="80" height="6" fill="#c43a31" opacity="0.8"/>
  <!-- Talisman brush strokes -->
  <path d="M695 460 Q720 455 745 462" stroke="#1a1a1a" stroke-width="1.5" fill="none" opacity="0.5"/>
  <path d="M690 480 Q720 475 750 485" stroke="#1a1a1a" stroke-width="1.5" fill="none" opacity="0.5"/>
  <path d="M695 500 Q720 495 745 505" stroke="#1a1a1a" stroke-width="1.5" fill="none" opacity="0.5"/>
  <!-- Gold coins/offerings -->
  <circle cx="600" cy="440" r="8" fill="#c9a96e" opacity="0.4"/>
  <circle cx="615" cy="445" r="8" fill="#c9a96e" opacity="0.3"/>
  <circle cx="840" cy="440" r="8" fill="#c9a96e" opacity="0.4"/>
  <circle cx="825" cy="445" r="8" fill="#c9a96e" opacity="0.3"/>
  <!-- Subtle fog at bottom -->
  <rect x="0" y="680" width="1440" height="220" fill="url(#altar)" opacity="0.8"/>
</svg>
