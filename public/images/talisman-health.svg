<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500">
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0faf0"/>
      <stop offset="100%" stop-color="#dce8d5"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#2d6a4f"/><stop offset="100%" stop-color="#1b4332"/></linearGradient>
    <linearGradient id="goldAccent" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#c9a96e"/><stop offset="100%" stop-color="#a88844"/></linearGradient>
  </defs>
  <rect x="20" y="20" width="360" height="460" rx="4" fill="url(#paper)" stroke="#c0d0b8" stroke-width="1"/>
  <rect x="20" y="20" width="360" height="8" rx="2" fill="url(#green)"/>
  <rect x="20" y="20" width="8" height="460" rx="2" fill="url(#green)"/>
  <!-- Health seal -->
  <rect x="150" y="50" width="100" height="90" rx="2" fill="url(#green)" opacity="0.9"/>
  <text x="200" y="85" text-anchor="middle" font-family="serif" font-size="14" fill="#f0faf0" font-weight="bold">康</text>
  <text x="200" y="110" text-anchor="middle" font-family="serif" font-size="14" fill="#f0faf0" font-weight="bold">泰</text>
  <!-- Gentle healing strokes -->
  <path d="M75 165 Q200 140 325 170" stroke="#1a1a1a" stroke-width="2.5" fill="none" opacity="0.6"/>
  <path d="M65 195 Q200 225 335 190" stroke="#1a1a1a" stroke-width="2" fill="none" opacity="0.5"/>
  <path d="M55 225 Q150 245 200 235 Q250 225 345 240" stroke="#1a1a1a" stroke-width="2.5" fill="none" opacity="0.6"/>
  <path d="M60 260 Q200 240 340 270" stroke="#1a1a1a" stroke-width="2" fill="none" opacity="0.5"/>
  <path d="M75 300 Q150 320 200 290 Q280 310 325 305" stroke="#1a1a1a" stroke-width="3" fill="none" opacity="0.6"/>
  <path d="M65 340 Q200 360 335 335" stroke="#1a1a1a" stroke-width="2" fill="none" opacity="0.5"/>
  <path d="M80 370 Q200 390 320 375" stroke="#1a1a1a" stroke-width="2" fill="none" opacity="0.5"/>
  <!-- Lotus petal decorations -->
  <path d="M200 175 Q215 200 200 215 Q185 200 200 175Z" fill="none" stroke="#2d6a4f" stroke-width="1" opacity="0.5"/>
  <path d="M200 175 Q225 195 215 215" fill="none" stroke="#2d6a4f" stroke-width="1" opacity="0.3"/>
  <path d="M200 175 Q175 195 185 215" fill="none" stroke="#2d6a4f" stroke-width="1" opacity="0.3"/>
  <path d="M200 300 Q215 325 200 340 Q185 325 200 300Z" fill="none" stroke="#2d6a4f" stroke-width="1" opacity="0.5"/>
  <!-- Bottom seal -->
  <rect x="260" y="410" width="100" height="55" rx="2" fill="url(#green)" opacity="0.85"/>
  <text x="310" y="433" text-anchor="middle" font-family="serif" font-size="11" fill="#f0faf0">健康符</text>
  <text x="310" y="452" text-anchor="middle" font-family="serif" font-size="9" fill="#f0faf0" opacity="0.8">长寿</text>
  <!-- Bottom accent -->
  <rect x="20" y="472" width="360" height="8" rx="2" fill="url(#goldAccent)"/>
</svg>
