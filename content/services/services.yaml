        title: "Delivery with Placement Guide"
        description: "You receive the Qi Aligner with detailed placement instructions and the consecration video."
    pricing:
      startingFrom: 299
    delivery: "Shipped within 7-10 business days"
    includes:
      - "Hand-crafted Qi Aligner device"
      - "Placement guide"
      - "Consecration ritual video"
      - "Care instructions"
    image: "/images/talisman-placeholder.svg"
    faq:
      - q: "Can I use this in my office?"
        a: "Yes, the Qi Aligner works for any space — home, office, or commercial."
      - q: "How is it consecrated for my space?"
        a: "You provide details about your space and intention. The priest performs the consecration with these specifics at the Longhu Mountain altar."
