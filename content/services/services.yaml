  - slug: "pet-memorial"
    title: "SoulCompanion Memorial Chest"
    titleCn: "万物灵宠雅化归藏匣"
    category: "ritual"
    tagline: "A sacred Taoist farewell for your beloved companion"
    description: "A beautifully hand-crafted memorial chest combined with a Taoist soul-transition ceremony for your beloved companion. The chest serves as a sacred vessel for their memory, while the ceremony guides their spirit with peace and dignity. Each chest is personalized with your companion's name and crafted with traditional joinery."
    whoNeedsIt:
      - "You've recently lost a beloved pet"
      - "You want a meaningful, spiritual farewell"
      - "You seek a physical memorial to honor their presence"
      - "You believe in the continuity of consciousness"
    process:
      - step: 1
        title: "Share Your Companion's Story"
        description: "You provide your companion's name, a photo, and a memory you'd like honored."
      - step: 2
        title: "Personalization"
        description: "Your companion's name is inscribed on the chest. The priest prepares the ceremony."
      - step: 3
        title: "Soul-Transition Ceremony"
        description: "Performed at the Longhu Mountain altar — guiding your companion's spirit with peace."
      - step: 4
        title: "Delivery of Chest & Video"
        description: "You receive the memorial chest and the full ceremony video."
    pricing:
      startingFrom: 349
    delivery: "Shipped within 7-10 business days"
    includes:
      - "Hand-crafted memorial chest (6x6x4 inches)"
      - "Personalized name card"
      - "Soul-transition ceremony"
      - "Full ritual video"
    image: "/images/talisman-placeholder.svg"
    faq:
      - q: "What can I put inside the chest?"
        a: "Ashes, collar, photos, favorite toys, or written memories — the chest is designed to hold your companion's mementos."
      - q: "Is the ceremony performed regardless of my companion's species?"
        a: "Yes, the Taoist soul-transition ceremony honors all sentient beings."
    relatedProducts:
      - "pet-memorial-chest"

