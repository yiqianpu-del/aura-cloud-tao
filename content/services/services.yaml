services:
  - slug: "karmic-release"
    title: "Karmic Release & Annual Blessing Ritual"
    titleCn: "业力释放与流年护持仪式"
    category: "ritual"
    tagline: "Release karmic burdens and align with your yearly destiny"
    description: "A powerful annual ritual performed at the Longhu Mountain altar. The priest inscribes your name and birth information, performs a karmic clearing ceremony, and blesses your path for the year ahead. This is our signature high-value service — combining deep spiritual clearing with personalized yearly protection."
    whoNeedsIt:
      - "Feeling stuck in recurring patterns or cycles"
      - "Going through a major life transition"
      - "Seeking spiritual protection for the coming year"
      - "Experiencing persistent bad luck or obstacles"
      - "Wanting to honor ancestors and clear ancestral karma"
    process:
      - step: 1
        title: "Submission & Intention Setting"
        description: "You provide your name, birth date, and intention. The priest notes your request on the altar."
      - step: 2
        title: "Altar Preparation"
        description: "The ritual space is prepared at Longhu Mountain — incense lit, offerings arranged, the talisman paper laid out."
      - step: 3
        title: "Karmic Clearing Ceremony"
        description: "The priest chants clearing scripture and performs the ritual on your behalf."
      - step: 4
        title: "Annual Blessing & Talisman Writing"
        description: "Your yearly protection talisman is hand-written and consecrated with your name and intention."
      - step: 5
        title: "Filmed Proof"
        description: "The complete ritual is filmed and sent to you — showing your name on the altar, brush strokes, and consecration."
    pricing:
      startingFrom: 499
      options:
        - name: "Basic — Annual Blessing"
          price: 499
        - name: "Premium — Karmic Release + Annual Blessing"
          price: 799
        - name: "Deluxe — Full Package with Home Talisman Set"
          price: 1299
    delivery: "Video proof sent within 5-7 business days"
    includes:
      - "Personalized annual blessing talisman"
      - "Full ritual video"
      - "Care and placement instructions"
      - "Premium shipping worldwide"
    image: "/images/talisman-placeholder.svg"
    faq:
      - q: "How is this different from a regular talisman order?"
        a: "This is a full ceremony — not just a talisman consecration. It includes chanted scripture, karmic clearing, and personalized yearly blessing."
      - q: "Do I need to be present?"
        a: "No. The ritual is performed at the Longhu Mountain altar on your behalf. Your information is presented at the altar."
    relatedProducts:
      - "talisman-decor"
  
